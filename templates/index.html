<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mera Kanha AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ── Reset & Base ── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            background: #0d0d0d;
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 15px;
            line-height: 1.6;
            overflow: hidden;
        }

        /* ── App Shell ── */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
            position: relative;
        }

        /* ── Top Bar ── */
        .top-bar {
            position: absolute;
            top: 16px;
            left: 20px;
            z-index: 10;
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: #888;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: color 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            color: #fff;
            background: #1a1a1a;
        }

        /* ── Main Content ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
            overflow: hidden;
            /* container for scroll */
        }

        .main.has-chat {
            justify-content: flex-start;
        }

        /* ── Welcome Screen ── */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-bottom: 40px;
            /* offset for visual centering */
            transition: opacity 0.2s;
        }

        .welcome.hidden {
            display: none;
        }

        .welcome-icon {
            font-size: 3rem;
            color: #fff;
            /* background: #212121; */
            background: #0d0d0d;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* ── Messages Scroll Area ── */
        .messages {
            width: 100%;
            flex: 1;
            overflow-y: auto;
            padding: 60px 0 20px;
            display: none;
            flex-direction: column;
            gap: 24px;
            scrollbar-width: thin;
            scrollbar-color: #333 transparent;
        }

        .messages.active {
            display: flex;
        }

        /* ── Input Container (Floating) ── */
        .input-container {
            width: 100%;
            max-width: 768px;
            margin-bottom: 40px;
            padding: 0 10px;
            flex-shrink: 0;
            position: relative;
            z-index: 20;
        }

        .input-bar {
            background: #212121;
            border-radius: 26px;
            /* Pill shape */
            padding: 10px 14px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            transition: box-shadow 0.2s;
        }

        .input-bar:focus-within {
            box-shadow: 0 0 0 2px #333;
        }

        /* ── Input Controls ── */
        .plus-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #2f2f2f;
            color: #888;
            border: none;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            margin-bottom: 3px;
            /* align with text bottom */
        }

        .plus-btn:hover {
            color: #ccc;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: #eee;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            outline: none;
            max-height: 150px;
            padding: 10px 0;
            line-height: 1.5;
        }

        textarea::placeholder {
            color: #666;
        }

        .right-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 3px;
        }

        /* ── Custom Dropdown ── */
        .dropdown {
            position: relative;
        }

        .dropdown-btn {
            background: transparent;
            color: #ccc;
            border: none;
            font-family: inherit;
            font-size: 0.9rem;
            padding: 6px 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            border-radius: 8px;
            transition: background 0.1s;
        }

        .dropdown-btn:hover {
            background: #2f2f2f;
            color: #fff;
        }

        .dropdown-btn svg {
            opacity: 0.6;
        }

        .dropdown-menu {
            position: absolute;
            bottom: 130%;
            /* Opens upward */
            right: 0;
            width: 220px;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 8px 0;
            display: none;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            max-height: 300px;
            overflow-y: auto;
            z-index: 100;
        }

        .dropdown-menu.show {
            display: flex;
        }

        .dropdown-header {
            padding: 8px 12px;
            border-bottom: 1px solid #2a2a2a;
            margin-bottom: 4px;
        }

        .dropdown-search {
            width: 100%;
            background: transparent;
            border: none;
            color: #ddd;
            font-size: 0.9rem;
            outline: none;
            font-family: inherit;
        }

        .dropdown-search::placeholder {
            color: #666;
        }

        .dropdown-items-container {
            display: flex;
            flex-direction: column;
        }

        .dropdown-item {
            padding: 8px 16px;
            font-size: 0.9rem;
            color: #ccc;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.1s;
        }

        .dropdown-item:hover {
            background: #2a2a2a;
            color: #fff;
        }

        .dropdown-item.selected {
            color: #fff;
            font-weight: 500;
        }

        .dropdown-item.selected::after {
            content: "✓";
            color: #fff;
            font-size: 0.8rem;
        }

        .dropdown-item.hidden {
            display: none;
        }

        /* ── Send Button ── */
        .send-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #333;
            color: #888;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn.ready {
            background: #fff;
            color: #000;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: default;
        }


        /* ── Message Styles ── */
        .message {
            display: flex;
            gap: 16px;
            max-width: 90%;
            margin: 0 auto;
            width: 100%;
        }

        .message-avatar {
            width: 24px;
            height: 24px;
            margin-top: 4px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message-content {
            flex: 1;
            font-size: 1rem;
            color: #dbdbdb;
            line-height: 1.6;
        }

        .message.user .message-content {
            color: #fff;
        }

        /* Markdown elements */
        .message-content p {
            margin-bottom: 12px;
        }

        .message-content strong {
            color: #fff;
            font-weight: 600;
        }

        .message-content ul,
        .message-content ol {
            margin-bottom: 12px;
            padding-left: 20px;
        }

        .message-content li {
            margin-bottom: 4px;
        }

        .message-content code {
            background: #2a2a2a;
            padding: 2px 5px;
            border-radius: 4px;
            font-family: 'Consolas', monospace;
            font-size: 0.9em;
            color: #e6e6e6;
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 10px;
            font-size: 0.8rem;
            color: #666;
            margin-top: auto;
        }

        footer a {
            color: #888;
            text-decoration: none;
        }

        footer a:hover {
            color: #aaa;
            text-decoration: underline;
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .app {
                padding: 0;
            }

            .input-container {
                margin-bottom: 20px;
            }

            .message {
                max-width: 95%;
                padding: 0 10px;
            }

            .right-controls {
                gap: 4px;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <!-- Top Left Actions -->
        <div class="top-bar">
            <!-- <button class="icon-btn" title="Sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
            </button> -->
            <button class="icon-btn" id="newChatBtn" title="New Chat">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
            </button>
        </div>

        <!-- Main Area -->
        <div class="main" id="mainContainer">
            <!-- Welcome (Centered Brand) -->
            <div class="welcome" id="welcome">
                <div class="welcome-icon">🦚</div>
                <h1>Mera Kanha AI</h1>
                <p style="color: #888;">Your Spiritual Charioteer</p>
            </div>

            <!-- Messages List -->
            <div class="messages" id="messages"></div>

            <!-- Input Bar -->
            <div class="input-container">
                <div class="input-bar">
                    <!-- <button class="plus-btn" title="Add attachment">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button> -->

                    <textarea id="messageInput" placeholder="Send a message" rows="1"></textarea>

                    <div class="right-controls">


                        <!-- Send Button -->
                        <button class="send-btn" id="sendBtn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="19" x2="12" y2="5"></line>
                                <polyline points="5 12 12 5 19 12"></polyline>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <footer>
            <div>Made with ❤️ by <a href="https://github.com/GirishSonune">Girish Sonune</a></div>
        </footer>
    </div>

    <script>
        const history = [];
        const input = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const messagesEl = document.getElementById('messages');
        const welcomeEl = document.getElementById('welcome');
        const mainContainer = document.getElementById('mainContainer');
        const newChatBtn = document.getElementById('newChatBtn');



        // Auto-resize
        input.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
            toggleSendBtn();
        });

        // Toggle button state
        function toggleSendBtn() {
            if (input.value.trim().length > 0) {
                sendBtn.classList.add('ready');
            } else {
                sendBtn.classList.remove('ready');
            }
        }

        // Enter to send
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        newChatBtn.addEventListener('click', () => {
            history.length = 0;
            messagesEl.innerHTML = '';
            messagesEl.classList.remove('active');
            welcomeEl.classList.remove('hidden');
            mainContainer.classList.remove('has-chat');
            input.focus();
        });

        // Simple Markdown Renderer
        function renderMarkdown(text) {
            return text
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>')
                .replace(/^(.+)$/, '<p>$1</p>');
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            // UI Transistion
            welcomeEl.classList.add('hidden');
            messagesEl.classList.add('active');
            mainContainer.classList.add('has-chat');

            // User Message
            addMessage('user', text);
            history.push({ role: 'user', content: text });
            input.value = '';
            input.style.height = 'auto';
            toggleSendBtn();

            // Bot Placeholder
            const botBubble = addMessage('assistant', '');

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text
                    })
                });

                const data = await response.json();
                botBubble.innerHTML = renderMarkdown(data.answer);
                history.push({ role: 'assistant', content: data.answer });
                messagesEl.scrollTop = messagesEl.scrollHeight;

            } catch (err) {
                botBubble.innerHTML = `<p style="color:#ff6b6b">Error: ${err.message}</p>`;
            }
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? '👤' : '🦚'; // Placeholder icons

            const content = document.createElement('div');
            content.className = 'message-content';
            content.innerHTML = text ? renderMarkdown(text) : '<span class="typing">Thinking...</span>';

            if (role === 'user') {
                div.appendChild(content); // User right, no avatar needed usually but structure keeps it clean
            } else {
                div.appendChild(avatar);
                div.appendChild(content);
            }

            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return content;
        }
    </script>
</body>

</html>
